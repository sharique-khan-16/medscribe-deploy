<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HarshithReddy11 — Upload UI</title>
  <link rel="stylesheet" href="/styles.css">
  <script>
    async function uploadFile(file){
      const fd = new FormData();
      fd.append('file', file, file.name);
      const res = await fetch('/upload', { method: 'POST', body: fd });
      return res.json();
    }

    function makeRow(item){
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${item.id}</td><td>${item.name}</td><td>${item.status}</td>`;
      return tr;
    }

    async function refreshTable(){
      const res = await fetch('/items');
      const json = await res.json();
      const tbody = document.querySelector('#items tbody');
      tbody.innerHTML = '';
      json.items.forEach(it => tbody.appendChild(makeRow(it)));
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      const drop = document.getElementById('drop');
      ['dragenter','dragover'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault(); drop.classList.add('hover')}));
      ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault(); drop.classList.remove('hover')}));
      drop.addEventListener('drop', async (ev)=>{
        const f = ev.dataTransfer.files[0];
        if(!f) return;
        await uploadFile(f);
        await refreshTable();
      });

      document.getElementById('fileInput').addEventListener('change', async (ev)=>{
        const f = ev.target.files[0]; if(!f) return; await uploadFile(f); await refreshTable();
      });

      document.getElementById('togglePremium').addEventListener('change', (ev)=>{
        document.documentElement.classList.toggle('premium-dark', ev.target.checked);
      });

      refreshTable();
    });
  </script>
</head>
<body>
  <header>
    <h1>HarshithReddy11 — Uploads</h1>
    <label><input id="togglePremium" type="checkbox"> Premium dark mode</label>
  </header>

  <main>
    <section id="uploader">
      <div id="drop">Drop file here or <button onclick="document.getElementById('fileInput').click()">choose</button>
        <input id="fileInput" type="file" style="display:none">
      </div>
    </section>

    <section id="table">
      <h2>Items</h2>
      <table id="items">
        <thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</body>
</html>
